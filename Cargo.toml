[package]
name = "cargo-plot"
version = "0.1.3"
authors = ["Jan Roman Cisowski „j-Cis”"]
edition = "2024"
rust-version = "1.93.1"
description = "Szwajcarski scyzoryk do wizualizacji struktury projektu i generowania raportów Markdown bezpośrednio z poziomu Cargo."
license = "MIT OR Apache-2.0"
readme = "README.md"
repository = "https://github.com/j-Cis/cargo-plot"
keywords = ["cargo", "tree", "markdown", "documentation", "cli"]
categories = ["development-tools::cargo-plugins", "command-line-utilities"]
resolver = "3"

[package.metadata.cargo]
edition = "2024"


[dependencies]
# Kluczowe dla logiki
chrono = "0.4.44"
walkdir = "2.5.0"
regex = "1.12.3"

# Kluczowe dla interfejsu (CLI/TUI)
clap = { version = "4.5.60", features = ["derive"] }
cliclack = "0.4.1"
colored = "3.1.1"

# stare
# inquire = "0.9.4"
# atty = "0.2"

[lib]
name = "lib"
path = "src/lib/mod.rs"
